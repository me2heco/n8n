#cloud-config
# n8n + PostgreSQL automation environment for Multipass (Ubuntu 24.04 Noble)
# Repo: me2he5/n8n-env
# Usage:
#   multipass launch 24.04 --name n8n-dev --cpus 2 --memory 4G --disk 30G --cloud-init n8n/cloud-init.yml
#
# [変更履歴]
#   v1: 初版（arm64固定・SQLite・n8n単体）
#   v2: arch自動検出対応（arm64/amd64両対応）、WEBHOOK_URL .env化
#   v3: PostgreSQL追加、systemdユニット追加、n8n-mcp除外（イメージ不在確認済み）

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release

runcmd:
  # --- Docker install ---
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  # アーキテクチャ自動検出（arm64/amd64両対応）+ Ubuntu 24.04 Noble対応
  - ARCH=$(dpkg --print-architecture) && . /etc/os-release && echo "deb [arch=${ARCH} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu ${VERSION_CODENAME} stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # --- Docker service ---
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu

  # --- n8n data directory ---
  - mkdir -p /opt/n8n/data
  - chown -R 1000:1000 /opt/n8n/data

  # --- PostgreSQL data directory ---
  - mkdir -p /opt/postgres/data
  - chown -R 999:999 /opt/postgres/data

  # --- .env template (WEBHOOK_URLはVM起動後にIPを確認して手動設定) ---
  - |
    cat > /opt/n8n/.env << 'ENVEOF'
    # VM起動後に以下を確認して設定してください
    # multipass info n8n-dev でIPアドレスを確認
    WEBHOOK_URL=http://CHANGE_ME:5678/
    ENVEOF

  # --- docker-compose.yml (n8n + PostgreSQL) ---
  - |
    cat > /opt/n8n/docker-compose.yml << 'DCEOF'
    services:
      postgres:
        image: postgres:16
        restart: unless-stopped
        environment:
          POSTGRES_USER: n8n
          POSTGRES_PASSWORD: n8n
          POSTGRES_DB: n8n
        volumes:
          - /opt/postgres/data:/var/lib/postgresql/data

      n8n:
        image: docker.n8n.io/n8nio/n8n:latest
        restart: unless-stopped
        ports:
          - "5678:5678"
        env_file:
          - .env
        environment:
          - N8N_HOST=0.0.0.0
          - N8N_PORT=5678
          - N8N_PROTOCOL=http
          - N8N_SECURE_COOKIE=false
          - GENERIC_TIMEZONE=Asia/Tokyo
          - TZ=Asia/Tokyo
          - DB_TYPE=postgresdb
          - DB_POSTGRESDB_HOST=postgres
          - DB_POSTGRESDB_PORT=5432
          - DB_POSTGRESDB_DATABASE=n8n
          - DB_POSTGRESDB_USER=n8n
          - DB_POSTGRESDB_PASSWORD=n8n
        volumes:
          - /opt/n8n/data:/home/node/.n8n
        depends_on:
          - postgres
    DCEOF

  # --- systemd unit for docker compose ---
  - |
    cat > /etc/systemd/system/n8n-compose.service << 'SVCEOF'
    [Unit]
    Description=n8n + PostgreSQL via Docker Compose
    Requires=docker.service
    After=docker.service

    [Service]
    Type=oneshot
    WorkingDirectory=/opt/n8n
    ExecStart=/usr/bin/docker compose up -d
    ExecStop=/usr/bin/docker compose down
    RemainAfterExit=yes

    [Install]
    WantedBy=multi-user.target
    SVCEOF

  - systemctl daemon-reload
  - systemctl enable n8n-compose
  - systemctl start n8n-compose

final_message: |
  ✅ n8n-dev setup complete.
  n8n:        http://<VM-IP>:5678
  PostgreSQL: running internally

  【次の手順】
  1. IPアドレス確認:
       multipass info n8n-dev
  2. WEBHOOK_URL設定:
       multipass exec n8n-dev -- sudo vi /opt/n8n/.env
       → WEBHOOK_URL=http://<VM-IP>:5678/ に変更
  3. n8n再起動:
       multipass exec n8n-dev -- bash -c "cd /opt/n8n && docker compose restart"
  4. ブラウザでアクセス:
       http://<VM-IP>:5678
